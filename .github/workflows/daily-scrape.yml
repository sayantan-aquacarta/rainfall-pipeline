name: Daily rainfall scrape

on:
  schedule:
    # 06:00 UTC = 11:30 IST. IMD typically publishes by ~10:00 IST so 11:30 is safe.
    - cron: "0 6 * * *"
  workflow_dispatch:        # allow manual runs from the Actions tab
    inputs:
      reason:
        description: "Optional reason for manual run"
        required: false

# Single-flight: never run two scrapes simultaneously
concurrency:
  group: rainfall-scrape
  cancel-in-progress: false

permissions:
  contents: write           # to commit the data
  issues: write             # to open an issue on failure

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scrape
        id: scrape
        run: |
          python -m rainfall.cli scrape 2>&1 | tee scrape.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit ${PIPESTATUS[0]}

      - name: Print run summary
        if: always()
        run: |
          python -m rainfall.cli info || true

      - name: Commit data
        if: success()
        run: |
          git config user.name  "rainfall-bot"
          git config user.email "rainfall-bot@users.noreply.github.com"
          git add data/ docs/api/ docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            DATE=$(date -u +%F)
            git commit -m "data: rainfall snapshot $DATE [skip ci]"
            # Retry push up to 3 times in case of races with another commit
            for i in 1 2 3; do
              if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then
                exit 0
              fi
              sleep 5
            done
            exit 1
          fi

      - name: Upload PDF + log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ github.run_id }}
          path: |
            data/raw_pdf/*.pdf
            scrape.log
          retention-days: 30
          if-no-files-found: warn

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let log = "";
            try { log = fs.readFileSync("scrape.log", "utf8").slice(-4000); } catch {}
            const date = new Date().toISOString().slice(0,10);
            const title = `Scrape failed on ${date}`;
            // Avoid duplicate open issues for the same day
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: ["scrape-failure"],
            });
            if (existing.data.some(i => i.title === title)) {
              core.info("Issue already exists for today.");
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ["scrape-failure", "automated"],
              body: [
                `The scheduled scrape failed.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `**Tail of log:**`,
                "```", log, "```",
              ].join("\n"),
            });

  deploy-pages:
    needs: scrape
    if: success()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with new commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
